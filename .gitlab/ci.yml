publish-gitlab:
  stage: publish
  image: python:3.11
  tags: 
    - aliyun-sit-runner
  before_script:
    - pip install poetry
    - |
      if [[ "$CI_COMMIT_TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?(-rc\.[0-9]+)?$ ]]; then
        VERSION="${CI_COMMIT_TAG#v}"
        sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
        echo "Updated version to: $VERSION"
      else
