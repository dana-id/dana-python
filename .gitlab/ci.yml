      fi
  script:
    - ls -lh dist
    - poetry config repositories.gitlab "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi"
    - poetry config http-basic.gitlab gitlab-ci-token "$CI_JOB_TOKEN"
    - poetry publish -r gitlab
  needs:
    - job: build-rc-package
      artifacts: true 
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-rc\.\d+$/'
      when: always

integration-test:
  stage: integration
  image: python:3.11
  tags: 
    - aliyun-sit-runner
  variables:
    PRIVATE_KEY: $PRIVATE_KEY
    X_PARTNER_ID: $X_PARTNER_ID
    ORIGIN: $ORIGIN
    CHANNEL_ID: $CHANNEL_ID
    MERCHANT_ID: $MERCHANT_ID
  script:
    # Create .netrc file for GitLab authentication
    - |  
      cat > ~/.netrc << EOF
      machine gitlab.dana.id
      login gitlab-ci-token
      password ${CI_JOB_TOKEN}
      EOF
      chmod 600 ~/.netrc
    # Clone the integration test repository
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.dana.id/automation/dana-self-integration-test.git
    - cd dana-self-integration-test
    - |
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        echo "Using package version: $CI_COMMIT_TAG"
        sed -i "s/dana-python-api-client>=0.2.0/dana-python-api-client==$CI_COMMIT_TAG/g" test/python/requirements.txt
        cat test/python/requirements.txt
      else
        echo "Warning: No version tag found, using latest RC version"
      fi
    - pip config set global.index-url https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.dana.id/api/v4/projects/automation%2Fdana-python-api-client/packages/pypi/simple
    - echo "Creating .env file from CI variables..."
    - |
      cat > .env << EOF
      MERCHANT_ID=${MERCHANT_ID}
      X_PARTNER_ID=${X_PARTNER_ID}
      CHANNEL_ID=${CHANNEL_ID}
      PRIVATE_KEY='${PRIVATE_KEY}'
      ORIGIN=${ORIGIN}
      EOF
    - echo "Created .env file"
    - bash run-test.sh python
  needs:
    - job: publish-gitlab
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-rc\.\d+$/'
      when: always

verify-rc-integration:
  stage: test
  image: alpine:latest
  tags:
    - aliyun-sit-runner
  script:
    # Install required tools
    - 'apk add --no-cache curl jq python3 git'
    # Extract version from tag
    - 'VERSION=${CI_COMMIT_TAG#v}'
    - 'echo "Looking for RC tags for version $VERSION"'
    # Download verification script from central repository
    - 'mkdir -p temp_scripts'
    - 'git clone --depth 1 https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.dana.id/automation/dana-api-client-generator.git temp_scripts/repo'
    - 'cp temp_scripts/repo/scripts/ci/verify_rc_integration.py temp_scripts/'
    - 'chmod +x temp_scripts/verify_rc_integration.py'
    # Run the verification script
    - 'LATEST_RC=$(python3 temp_scripts/verify_rc_integration.py "$VERSION")'
    - 'EXIT_CODE=$?'
    - 'if [ $EXIT_CODE -ne 0 ]; then echo "Failed to find RC tag with passing integration tests"; exit 1; fi'
    - 'echo "Verified RC tag for release: $LATEST_RC"'

  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always

publish-pypi:
  stage: publish
  image: python:3.11
  tags: 
    - aliyun-sit-runner
  before_script:
    - pip install poetry
    - |
      if [[ "$CI_COMMIT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
        VERSION="${CI_COMMIT_TAG#v}"
        sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
        echo "Updated version to: $VERSION"
      else
        echo "Tag format invalid or not provided. Skipping version update."
      fi
  script:
    - pip install poetry
    # Create .gitattributes to exclude ci directory from the package
    - echo "ci/** export-ignore" > .gitattributes
    - echo "Excluding ci directory from package..."
    - poetry config pypi-token.pypi "$POETRY_PYPI_TOKEN_PYPI"
    - poetry publish --no-interaction
  needs:
    - job: build-public-package
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: manual

publish-to-github:
  stage: sync
  image: alpine:latest
  tags:
    - aliyun-sit-runner
  variables:
    GITHUB_REPO: "dana-id/python_client"
  needs:
    - job: publish-pypi
  before_script:
    - apk add --no-cache git rsync
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@dana.id"
  script:
    - echo "Preparing to sync to GitHub..."
    # Using access token in a more explicit format for authentication
    - git clone https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git /tmp/github-sync || mkdir -p /tmp/github-sync
    - cd /tmp/github-sync
    
    # If repository exists, use it; otherwise initialize a new one
    - |
      if [ -d ".git" ]; then
        echo "Using existing repository"
        git checkout main || git checkout -b main
      else
        echo "Initializing new repository"
        git init
        git config user.name "GitLab CI"
        git config user.email "ci@dana.id"
        git remote add origin https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git
        git branch -M main
      fi
      
    # Copy files from project directory, preserving .git
    - echo "Copying files from project directory..."
    - cd $CI_PROJECT_DIR
    - rsync -av --ignore-errors --exclude=".git/" --exclude=".gitlab-ci.yml" --exclude=".gitignore" --exclude=".pytest_cache/" --exclude="__pycache__/" --exclude="*.pyc" --exclude="ci/" ./ /tmp/github-sync/
    
    # Commit and push changes
    - cd /tmp/github-sync
    - git add .
    - git diff --staged --quiet || git commit -m "Generated DANA Python SDK"
    - echo "Pushing to GitHub..."
    - git push https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git main
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success

.dependabot:
  image:
    name: docker.io/andrcuns/dependabot-gitlab-pip:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: none
    PACKAGE_MANAGER: $CI_JOB_NAME
    RAILS_ENV: production
    SETTINGS__GITLAB_URL: $CI_SERVER_URL
    SETTINGS__STANDALONE: "true"
  before_script:
    - cd /home/dependabot/app
  script:
    - bundle exec rake "dependabot:update[$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME,$PACKAGE_MANAGER,/]"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_NAME == "dependabot"'
  tags:
    - aliyun-sit-runner

pip:
  extends: .dependabot